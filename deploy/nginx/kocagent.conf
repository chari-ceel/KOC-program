upstream koc_frontend { server frontend:3000; keepalive 32; }
upstream koc_backend  { server backend:8000;  keepalive 32; }
upstream koc_agent    { server agent:8010;   keepalive 32; }
upstream koc_health   { server health:80;     keepalive 32; }

server {
    listen 8928;
    server_name _;

    client_max_body_size 50m;
    proxy_http_version 1.1;
    proxy_set_header Host              $host:$server_port;
    proxy_set_header X-Real-IP         $remote_addr;
    proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_set_header Upgrade           $http_upgrade;
    proxy_set_header Connection        "upgrade";
    proxy_read_timeout 300s;

    location = /health { return 404; }
    location /health/ { return 404; }
    location = /api/health { return 404; }
    location /api/debug/ { return 404; }
    location = /prompt-lab { return 404; }
    location /prompt-lab/ { return 404; }
    location = /debug { return 404; }
    location /debug/ { return 404; }
    location = /prompt-debug { return 404; }
    location /prompt-debug/ { return 404; }

    location = /__prompt-lab {
        proxy_pass http://koc_agent/prompt-lab;
    }
    location = /__prompt-lab/ {
        proxy_pass http://koc_agent/prompt-lab;
    }
    location /__prompt-lab/debug/ {
        rewrite ^/__prompt-lab/debug/(.*)$ /debug/$1 break;
        proxy_pass http://koc_agent;
    }

    location /api/ {
        proxy_pass http://koc_backend;
    }

    location / {
        proxy_pass http://koc_frontend;
    }
}
